server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # サーバー情報を隠す
    server_tokens off;

    # セキュリティヘッダー
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # リクエストボディサイズ制限（画像アップロード上限 + マージン）
    client_max_body_size 6M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # FastCGIバッファ設定
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # 隠しファイルへのアクセスを全て拒否
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # PHP以外の実行ファイルを直接実行させない
    location ~* \.(sh|bash|env|log|sql|conf)$ {
        deny all;
        return 404;
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}
