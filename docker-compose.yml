services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: x_mock_app
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - x_mock_network

  web:
    image: nginx:1.27-alpine
    container_name: x_mock_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - x_mock_network

  db:
    image: mysql:8.4
    container_name: x_mock_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - x_mock_network

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: x_mock_phpmyadmin
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
      UPLOAD_LIMIT: 64M
    depends_on:
      - db
    networks:
      - x_mock_network
    profiles:
      - dev

networks:
  x_mock_network:
    driver: bridge

volumes:
  db_data:
